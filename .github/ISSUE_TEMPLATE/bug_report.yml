name: Bug report
description: Something is wrong or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. For security issues, do **not** file a public issue — see `SECURITY.md`.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - engine (Rust)
        - control plane (TypeScript)
        - dashboard
        - SDK (TypeScript)
        - SDK (Python)
        - deploy / self-host
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version / commit, OS, Postgres version, how you're running it (compose, local, …).
    validations:
      required: false
