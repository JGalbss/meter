name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust — fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: format
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        # Bound parallel testcontainers so the Docker daemon is not overwhelmed.
        run: cargo test --workspace -- --test-threads=2

  typescript:
    name: typescript — biome, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: install
        run: pnpm install --frozen-lockfile
      - name: audit
        run: pnpm audit --audit-level high
      - name: biome
        run: pnpm exec biome check sdks apps
      - name: typecheck
        run: pnpm --filter "@meter/*" run typecheck
      - name: test
        # Run package suites serially: each spins in-process HTTP test servers, and stacking
        # multiple vitest processes on a small runner can starve them into spurious timeouts.
        run: pnpm --workspace-concurrency=1 --filter "@meter/*" run test

  python:
    name: python — ruff, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: ruff (lint + format)
        run: |
          pip install ruff
          ruff check .
          ruff format --check .
      - name: test
        run: PYTHONPATH=. python3 -m unittest discover -s tests -p "test_*.py"

  dashboard:
    name: dashboard — typecheck, lint, format, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: install
        run: bun install --frozen-lockfile
      - name: control-plane client types are up to date
        run: bun run gen:api && git diff --exit-code lib/meter/control-plane.gen.ts
      - name: typecheck
        run: bun run typecheck
      - name: lint
        run: bun run lint
      - name: format
        run: bun run format:check
      - name: build
        run: bun run build

  docs:
    name: docs — typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/docs
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: install
        run: bun install --frozen-lockfile
      - name: typecheck
        run: bun run typecheck
      - name: build
        run: bun run build
