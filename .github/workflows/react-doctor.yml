# React Doctor — security, performance, correctness, accessibility, and bundle-size review of the
# dashboard's React code. Advisory: it posts a sticky PR summary + a commit status with the health
# score, but does not fail the check. On PRs it scans changed files (so the vendored shadcn primitives
# under components/ui are not re-flagged); on main it tracks the score trend.
#
# Docs: https://www.react.doctor/ci

name: React Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: millionco/react-doctor@v2
        with:
          directory: apps/dashboard
