# Production-style local stack: Postgres (money-truth) + ClickHouse (events) + the meter engine + the
# control plane.
#   docker compose -f deploy/docker-compose.yml up --build
# The engine applies ledger migrations (Postgres) + event migrations (ClickHouse) on boot and serves on
# :8080; the control plane applies its config migrations on boot, serves on :8090, calls the engine.

name: meter

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: meter
      POSTGRES_PASSWORD: meter
      POSTGRES_DB: meter
    volumes:
      - meter_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meter -d meter"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    volumes:
      - meter_ch:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  engine:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      METER_DATABASE_URL: postgres://meter:meter@postgres:5432/meter
      METER_CLICKHOUSE_URL: http://clickhouse:8123
      METER_LISTEN_ADDR: 0.0.0.0:8080
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  control-plane:
    build:
      context: ..
      dockerfile: deploy/control-plane.Dockerfile
    restart: unless-stopped
    environment:
      METER_CONTROL_PLANE_DATABASE_URL: postgres://meter:meter@postgres:5432/meter
      METER_CONTROL_PLANE_PORT: "8090"
      METER_ENGINE_URL: http://engine:8080
      METER_EVALUATION_INTERVAL_SECONDS: "60"
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      engine:
        condition: service_started

volumes:
  meter_pg:
  meter_ch:
