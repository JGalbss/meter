# Serves the static documentation export (deploy/docs.Dockerfile). The Next.js export writes flat
# files (e.g. out/api/engine.html), so resolve extensionless paths to their .html counterpart and fall
# back to the generated 404 page.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    # Pagefind's index + bundle are long-lived, content-hashed assets.
    location /pagefind/ {
        add_header Cache-Control "public, max-age=3600";
    }

    error_page 404 /404.html;
}
