apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meter.fullname" . }}-control-plane
  labels:
    {{- include "meter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      {{- include "meter.selectorLabels" (merge (dict "component" "control-plane") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "meter.selectorLabels" (merge (dict "component" "control-plane") .) | nindent 8 }}
    spec:
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.port }}
          env:
            - name: METER_CONTROL_PLANE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "meter.secretName" . }}
                  key: control-plane-database-url
            - name: METER_CONTROL_PLANE_PORT
              value: {{ .Values.controlPlane.port | quote }}
            - name: METER_ENGINE_URL
              value: {{ include "meter.engineUrl" . | quote }}
            - name: METER_EVALUATION_INTERVAL_SECONDS
              value: {{ .Values.controlPlane.evaluationIntervalSeconds | quote }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "meter.fullname" . }}-control-plane
  labels:
    {{- include "meter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "meter.selectorLabels" (merge (dict "component" "control-plane") .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.controlPlane.port }}
      targetPort: http
