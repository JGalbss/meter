apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meter.fullname" . }}-engine
  labels:
    {{- include "meter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.engine.replicas }}
  selector:
    matchLabels:
      {{- include "meter.selectorLabels" (merge (dict "component" "engine") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "meter.selectorLabels" (merge (dict "component" "engine") .) | nindent 8 }}
    spec:
      containers:
        - name: engine
          image: "{{ .Values.engine.image.repository }}:{{ .Values.engine.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.engine.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.engine.listenPort }}
          env:
            - name: METER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "meter.secretName" . }}
                  key: database-url
            - name: METER_CLICKHOUSE_URL
              value: {{ include "meter.clickhouseUrl" . | quote }}
            - name: METER_LISTEN_ADDR
              value: {{ printf "0.0.0.0:%d" (int .Values.engine.listenPort) | quote }}
            - name: METER_CREDIT_VALUE
              value: {{ .Values.engine.creditValue | quote }}
            - name: RUST_LOG
              value: info
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.engine.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "meter.fullname" . }}-engine
  labels:
    {{- include "meter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "meter.selectorLabels" (merge (dict "component" "engine") .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.engine.listenPort }}
      targetPort: http
