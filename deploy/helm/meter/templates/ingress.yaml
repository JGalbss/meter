{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "meter.fullname" . }}
  labels:
    {{- include "meter.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
        {{- with .Values.ingress.controlPlaneHost }}
        - {{ . | quote }}
        {{- end }}
        {{- with .Values.ingress.engineHost }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "meter.fullname" . }}-dashboard
                port:
                  number: {{ .Values.dashboard.port }}
    {{- with .Values.ingress.controlPlaneHost }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "meter.fullname" $ }}-control-plane
                port:
                  number: {{ $.Values.controlPlane.port }}
    {{- end }}
    {{- with .Values.ingress.engineHost }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "meter.fullname" $ }}-engine
                port:
                  number: {{ $.Values.engine.listenPort }}
    {{- end }}
{{- end }}
